# Claw Universe Docker Compose
# Production deployment with MySQL 8.0, Redis, and Node.js backend

services:
  # MySQL 8.0 Database
  db:
    image: mysql:8.0
    container_name: claw-universe-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-claw_universe_root}
      MYSQL_DATABASE: claw_universe
      MYSQL_USER: ${MYSQL_USER:-claw}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-claw_secure_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --skip-log-bin
      - --innodb-buffer-pool-size=256M
    networks:
      - claw-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-claw_universe_root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: claw-universe-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - claw-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claw-universe-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3000}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-claw}
      DB_PASSWORD: ${MYSQL_PASSWORD:-claw_secure_pass}
      DB_NAME: claw_universe
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      CHAIN: ${CHAIN:-sol}
      PLATFORM_FEE_PERCENT: 15
      REPUTATION_REWARD_PERCENT: 5
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - claw-network
    volumes:
      - ./uploads:/app/uploads:ro

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: claw-universe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - claw-network
    profiles:
      - with-nginx

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  claw-network:
    driver: bridge
