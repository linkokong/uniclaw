name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/claw-universe

jobs:
  # ── Build & Push ────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── Deploy to Staging ───────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/claw-universe
            git pull origin main
            docker pull ${{ needs.build-and-push.outputs.image-tag }}
            docker-compose -f docker-compose.yml up -d --no-deps api
            docker image prune -f

  # ── Deploy to Production ─────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [build-and-push, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'

    steps:
      - name: Notify deployment start
        run: |
          echo "🚀 Deploying version ${{ github.sha }} to production"

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/claw-universe
            git pull origin main
            docker pull ${{ needs.build-and-push.outputs.image-tag }}
            docker-compose -f docker-compose.yml up -d
            docker image prune -f

      - name: Smoke test production
        run: |
          sleep 15
          curl -sf https://api.${{ secrets.DOMAIN }}/health \
            || curl -sf http://localhost:${{ secrets.PROD_API_PORT }}/health \
            || { echo "Smoke test failed"; exit 1; }

      - name: Create deployment tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          curl -X POST https://api.github.com/repos/${{ github.repository }}/releases \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d "{\"tag_name\": \"${{ github.ref_name }}\",\"name\":\"Release ${{ github.ref_name }}\"}"

  # ── Load Test (on staging) ──────────────────────────────────────────────────
  load-test-staging:
    name: Load Test (Staging)
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run smoke test
        run: |
          k6 run tests/load/k6-script.js \
            --env SCENARIO=light \
            --env API_URL=${{ secrets.STAGING_API_URL }} \
            --env BASE_URL=${{ secrets.STAGING_BASE_URL }}

      - name: Run medium load test
        run: |
          k6 run tests/load/k6-script.js \
            --env SCENARIO=medium \
            --env API_URL=${{ secrets.STAGING_API_URL }} \
            --env BASE_URL=${{ secrets.STAGING_BASE_URL }}
